name: 🚀 Release & Build EXE

on:
  push:
    tags:
      - 'v*'  # Срабатывает при пуше тега вида v1.0.0, v2.1.3 и т.д.

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write  # 🔑 Обязательно для создания релизов

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy pyinstaller

      - name: 🔍 Verify files
        run: |
          if (-Not (Test-Path "gui_qwen.py")) { Write-Error "❌ gui_qwen.py not found"; exit 1 }
          if (-Not (Test-Path "full_stats_report.csv")) { Write-Error "❌ CSV not found"; exit 1 }

      - name: 🛠 Build EXE
        run: |
          pyinstaller --onefile --windowed --name "Dota2Stats" `
            --add-data "full_stats_report.csv;." `
            gui_qwen.py

      - name: 📤 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: 🎮 Dota 2 Stats ${{ github.ref_name }}
          body: |
            📦 Автоматическая сборка Windows EXE
            🔧 Версия: ${{ github.ref_name }}
            📅 Дата сборки: ${{ github.event.head_commit.timestamp }}
            
            ✅ Включает актуальные данные из `full_stats_report.csv`
            🖥️ Запуск: двойной клик по `Dota2Stats.exe`
          files: dist/Dota2Stats.exe
          draft: false
          prerelease: false
          generate_release_notes: true