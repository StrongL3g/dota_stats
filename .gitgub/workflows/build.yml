name: Build Dota App for Mac and Win

on: [push] # Сборка будет запускаться при каждом пуше в гит

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, windows-latest] # Собираем сразу для обеих систем
    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas PyQt6 pyinstaller

    - name: Build with PyInstaller
      run: |
        pyinstaller --noconsole --onefile --name "DotaAnalytics_${{ matrix.os }}" main_st.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: DotaApp-${{ matrix.os }}
        path: dist/